<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>이감 모의고사 학생 주문</title>
<style>
  :root {
    --navy: #1f2a44;
    --accent: #2f6fed;
    --bg: #f4f6fa;
    --line: #dde3ee;
    --text: #222b3a;
    --muted: #6b7688;
    --ok: #1a7f4e;
    --warn: #b3261e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 64px; }
  header {
    background: var(--navy); color: #fff; border-radius: 12px;
    padding: 26px 22px; margin-bottom: 20px;
  }
  header .brand { font-size: 13px; opacity: .8; letter-spacing: .5px; }
  header h1 { font-size: 21px; margin-top: 6px; font-weight: 700; }
  header .branch-name {
    display: inline-block; margin-top: 12px; padding: 6px 14px;
    background: rgba(255,255,255,.14); border-radius: 20px; font-size: 14px;
  }
  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .card h2 {
    font-size: 15px; color: var(--navy); margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input[type=text], input[type=tel], textarea {
    width: 100%; padding: 11px 12px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px; font-family: inherit;
  }
  input:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .product-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .product-row:last-child { border-bottom: none; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 600; }
  .product-price { font-size: 12px; color: var(--muted); }
  .qty-box { display: flex; align-items: center; gap: 6px; }
  .qty-box button {
    width: 34px; height: 34px; border: 1px solid var(--line); background: #fff;
    border-radius: 8px; font-size: 18px; cursor: pointer; color: var(--navy);
  }
  .qty-box input {
    width: 52px; height: 34px; text-align: center; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px;
  }
  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: #eef3fe; border-radius: 8px; padding: 12px 16px; margin-top: 14px; font-size: 14px;
  }
  .total-bar .amount { font-size: 18px; font-weight: 700; color: var(--accent); }
  .submit-btn {
    width: 100%; padding: 15px; font-size: 16px; font-weight: 700;
    background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer;
  }
  .submit-btn:disabled { background: #a9bde6; cursor: not-allowed; }
  .notice { font-size: 12px; color: var(--muted); margin-top: 12px; }
  .msg { padding: 14px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
  .msg.ok { background: #e7f5ee; color: var(--ok); border: 1px solid #bfe3d0; display: block; }
  .msg.err { background: #fdecea; color: var(--warn); border: 1px solid #f5c6c2; display: block; }
  .msg .order-id { font-weight: 700; }
  .loading { text-align: center; color: var(--muted); font-size: 14px; padding: 20px 0; }
  #formArea { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">YIGAM × 잇올 독학관리학원</div>
    <h1>이감 모의고사 학생 주문</h1>
    <span class="branch-name" id="branchName">지점 확인 중...</span>
  </header>

  <div id="msgBox" class="msg"></div>
  <div class="loading" id="pageLoading">주문 정보를 불러오는 중...</div>

  <div id="formArea">
    <div class="card">
      <h2>1. 학생 정보</h2>
      <label for="stuName">이름</label>
      <input type="text" id="stuName" placeholder="예: 김학생">
      <label for="stuPhone">연락처</label>
      <input type="tel" id="stuPhone" placeholder="예: 010-1234-5678">
    </div>

    <div class="card">
      <h2>2. 주문 상품</h2>
      <div id="productList"></div>
      <div class="total-bar">
        <span>주문 합계</span>
        <span class="amount" id="totalAmount">0원</span>
      </div>
    </div>

    <div class="card">
      <h2>3. 요청 사항</h2>
      <label for="memo">메모 (선택)</label>
      <textarea id="memo" rows="2" placeholder="전달 사항이 있으면 입력하세요"></textarea>
    </div>

    <button class="submit-btn" id="submitBtn">주문 제출</button>
    <p class="notice">제출된 주문은 소속 학원에서 확인·승인한 뒤 본사로 전달됩니다. 수정이 필요하면 학원 담당 선생님께 말씀해 주세요.</p>
  </div>
</div>

<script src="config.js"></script>
<script>
(function () {
  var API = (window.ITALL_CONFIG && window.ITALL_CONFIG.apiUrl) || "";
  var CODE = new URLSearchParams(location.search).get("b") || "";
  var products = [];

  function won(n) { return n.toLocaleString("ko-KR") + "원"; }
  function showMsg(type, html) {
    var box = document.getElementById("msgBox");
    box.className = "msg " + type;
    box.innerHTML = html;
    box.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  function fail(text) {
    document.getElementById("pageLoading").style.display = "none";
    document.getElementById("branchName").textContent = "접속 불가";
    showMsg("err", text);
  }

  function renderProducts() {
    var box = document.getElementById("productList");
    box.innerHTML = "";
    products.filter(function (p) { return p.active; }).forEach(function (p) {
      var row = document.createElement("div");
      row.className = "product-row";
      row.innerHTML =
        '<div class="product-info">' +
          '<div class="product-name"></div>' +
          '<div class="product-price">' + (p.price > 0 ? "단가 " + won(p.price) : "가격 학원 안내") + "</div>" +
        "</div>" +
        '<div class="qty-box">' +
          '<button type="button" data-d="-1">−</button>' +
          '<input type="number" min="0" value="0">' +
          '<button type="button" data-d="1">+</button>' +
        "</div>";
      row.querySelector(".product-name").textContent = p.name;
      var input = row.querySelector("input");
      input.dataset.name = p.name;
      input.dataset.price = p.price;
      row.querySelectorAll("button").forEach(function (btn) {
        btn.addEventListener("click", function () {
          input.value = Math.max(0, (parseInt(input.value, 10) || 0) + parseInt(btn.dataset.d, 10));
          updateTotal();
        });
      });
      input.addEventListener("input", updateTotal);
      box.appendChild(row);
    });
  }

  function collectItems() {
    var items = [];
    document.querySelectorAll("#productList input[type=number]").forEach(function (input) {
      var qty = parseInt(input.value, 10) || 0;
      if (qty > 0) items.push({ product: input.dataset.name, qty: qty, price: parseInt(input.dataset.price, 10) || 0 });
    });
    return items;
  }
  function updateTotal() {
    var total = collectItems().reduce(function (s, it) { return s + it.qty * it.price; }, 0);
    document.getElementById("totalAmount").textContent = won(total);
  }

  document.getElementById("submitBtn").addEventListener("click", function () {
    var name = document.getElementById("stuName").value.trim();
    var phone = document.getElementById("stuPhone").value.trim();
    var items = collectItems();
    if (!name) { showMsg("err", "이름을 입력해 주세요."); return; }
    if (!phone) { showMsg("err", "연락처를 입력해 주세요."); return; }
    if (!items.length) { showMsg("err", "주문 수량을 1개 이상 입력해 주세요."); return; }
    var btn = this;
    btn.disabled = true; btn.textContent = "제출 중...";
    fetch(API, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "studentOrder",
        data: { code: CODE, manager: name, phone: phone, items: items, memo: document.getElementById("memo").value.trim() }
      })
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (!res.ok) throw new Error(res.error || "접수 실패");
        showMsg("ok", "주문이 접수되었습니다. 주문번호 <span class='order-id'>" + res.orderId + "</span> 를 보관해 주세요. 학원 승인 후 확정됩니다.");
        document.querySelectorAll("#productList input[type=number]").forEach(function (i) { i.value = 0; });
        document.getElementById("memo").value = "";
        updateTotal();
      })
      .catch(function (e) { showMsg("err", "접수에 실패했습니다: " + e.message + " 잠시 후 다시 시도하거나 학원에 문의해 주세요."); })
      .finally(function () { btn.disabled = false; btn.textContent = "주문 제출"; });
  });

  if (!API) { fail("시스템 연결 전입니다. 학원에 문의해 주세요."); return; }
  if (!CODE) { fail("잘못된 접속 주소입니다. 학원에서 받은 주문 링크로 다시 접속해 주세요."); return; }
  fetch(API + "?action=student&b=" + encodeURIComponent(CODE))
    .then(function (r) { return r.json(); })
    .then(function (res) {
      if (!res.ok) throw new Error(res.error || "지점 확인 실패");
      products = res.products || [];
      document.getElementById("branchName").textContent = res.branchName;
      document.getElementById("pageLoading").style.display = "none";
      document.getElementById("formArea").style.display = "block";
      renderProducts();
    })
    .catch(function (e) { fail(e.message); });
})();
</script>
</body>
</html>
