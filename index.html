<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>이감 모의고사 주문 — 잇올 독학관리학원</title>
<style>
  :root {
    --navy: #1f2a44;
    --accent: #2f6fed;
    --bg: #f4f6fa;
    --line: #dde3ee;
    --text: #222b3a;
    --muted: #6b7688;
    --ok: #1a7f4e;
    --warn: #b3261e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 64px; }
  header {
    background: var(--navy); color: #fff; border-radius: 12px;
    padding: 28px 24px; margin-bottom: 20px;
  }
  header .brand { font-size: 13px; opacity: .8; letter-spacing: .5px; }
  header h1 { font-size: 22px; margin-top: 6px; font-weight: 700; }
  header p { font-size: 13px; opacity: .85; margin-top: 8px; }
  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .card h2 {
    font-size: 15px; color: var(--navy); margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  select, input[type=text], input[type=tel], textarea {
    width: 100%; padding: 11px 12px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px; background: #fff;
    font-family: inherit;
  }
  select:focus, input:focus, textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .product-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .product-row:last-child { border-bottom: none; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 600; }
  .product-price { font-size: 12px; color: var(--muted); }
  .qty-box { display: flex; align-items: center; gap: 6px; }
  .qty-box button {
    width: 34px; height: 34px; border: 1px solid var(--line); background: #fff;
    border-radius: 8px; font-size: 18px; cursor: pointer; color: var(--navy);
  }
  .qty-box input {
    width: 56px; height: 34px; text-align: center; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px;
  }
  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: #eef3fe; border-radius: 8px; padding: 12px 16px; margin-top: 14px;
    font-size: 14px;
  }
  .total-bar .amount { font-size: 18px; font-weight: 700; color: var(--accent); }
  .submit-btn {
    width: 100%; padding: 15px; font-size: 16px; font-weight: 700;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    cursor: pointer; margin-top: 4px;
  }
  .submit-btn:disabled { background: #a9bde6; cursor: not-allowed; }
  .notice { font-size: 12px; color: var(--muted); margin-top: 12px; }
  .msg { padding: 14px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
  .msg.ok { background: #e7f5ee; color: var(--ok); border: 1px solid #bfe3d0; display: block; }
  .msg.err { background: #fdecea; color: var(--warn); border: 1px solid #f5c6c2; display: block; }
  .msg .order-id { font-weight: 700; }
  .fallback { display: none; }
  .fallback textarea { height: 180px; font-size: 13px; margin-top: 8px; }
  .copy-btn {
    margin-top: 8px; padding: 10px 16px; font-size: 14px; border: 1px solid var(--accent);
    color: var(--accent); background: #fff; border-radius: 8px; cursor: pointer;
  }
  .loading { text-align: center; color: var(--muted); font-size: 14px; padding: 20px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">YIGAM × 잇올 독학관리학원</div>
    <h1>이감 모의고사 주문 접수</h1>
    <p>지점별 주문을 이 페이지로 접수해 주세요. 제출 즉시 본사 취합 시스템에 등록됩니다.</p>
  </header>

  <div id="msgBox" class="msg"></div>

  <div class="card">
    <h2>1. 지점 정보</h2>
    <label for="branch">지점 선택</label>
    <select id="branch"><option value="">지점을 선택하세요</option></select>
    <label for="manager">담당자 이름</label>
    <input type="text" id="manager" placeholder="예: 김담당">
    <label for="phone">담당자 연락처</label>
    <input type="tel" id="phone" placeholder="예: 010-1234-5678">
  </div>

  <div class="card">
    <h2>2. 주문 상품</h2>
    <div id="productList" class="loading">상품 목록을 불러오는 중...</div>
    <div class="total-bar">
      <span>주문 합계</span>
      <span class="amount" id="totalAmount">0원</span>
    </div>
  </div>

  <div class="card">
    <h2>3. 요청 사항</h2>
    <label for="memo">배송·기타 메모 (선택)</label>
    <textarea id="memo" rows="3" placeholder="배송 관련 요청이나 전달 사항을 입력하세요"></textarea>
  </div>

  <button class="submit-btn" id="submitBtn">주문 제출</button>
  <p class="notice">제출 후 수정이 필요하면 본사 담당자에게 연락해 주세요. 동일 내용을 중복 제출하지 않도록 유의 바랍니다.</p>

  <div class="card fallback" id="fallbackCard">
    <h2>주문 텍스트 전송 (임시 접수)</h2>
    <p style="font-size:13px;color:var(--muted)">시스템 연결이 아직 완료되지 않아 자동 접수가 불가합니다. 아래 주문 내용을 복사해 본사 담당자에게 카카오톡 또는 문자로 보내 주세요.</p>
    <textarea id="fallbackText" readonly></textarea>
    <button class="copy-btn" id="copyBtn">주문 내용 복사</button>
  </div>
</div>

<script src="config.js"></script>
<script>
(function () {
  var API = (window.ITALL_CONFIG && window.ITALL_CONFIG.apiUrl) || "";
  var products = [];
  var branches = [];

  function won(n) { return n.toLocaleString("ko-KR") + "원"; }

  function showMsg(type, html) {
    var box = document.getElementById("msgBox");
    box.className = "msg " + type;
    box.innerHTML = html;
    box.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  function renderBranches() {
    var sel = document.getElementById("branch");
    branches.filter(function (b) { return b.active; }).forEach(function (b) {
      var op = document.createElement("option");
      op.value = b.name; op.textContent = b.name;
      sel.appendChild(op);
    });
  }

  function renderProducts() {
    var box = document.getElementById("productList");
    box.className = "";
    box.innerHTML = "";
    products.filter(function (p) { return p.active; }).forEach(function (p, i) {
      var row = document.createElement("div");
      row.className = "product-row";
      row.innerHTML =
        '<div class="product-info">' +
          '<div class="product-name"></div>' +
          '<div class="product-price">' + (p.price > 0 ? "단가 " + won(p.price) : "단가 별도 안내") + "</div>" +
        "</div>" +
        '<div class="qty-box">' +
          '<button type="button" data-d="-1">−</button>' +
          '<input type="number" min="0" value="0" data-i="' + i + '">' +
          '<button type="button" data-d="1">+</button>' +
        "</div>";
      row.querySelector(".product-name").textContent = p.name;
      var input = row.querySelector("input");
      row.querySelectorAll("button").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var v = Math.max(0, (parseInt(input.value, 10) || 0) + parseInt(btn.dataset.d, 10));
          input.value = v; updateTotal();
        });
      });
      input.addEventListener("input", updateTotal);
      input.dataset.name = p.name;
      input.dataset.price = p.price;
      box.appendChild(row);
    });
    if (!box.children.length) box.innerHTML = '<div class="loading">등록된 상품이 없습니다. 본사에 문의해 주세요.</div>';
  }

  function collectItems() {
    var items = [];
    document.querySelectorAll("#productList input[type=number]").forEach(function (input) {
      var qty = parseInt(input.value, 10) || 0;
      if (qty > 0) items.push({ product: input.dataset.name, qty: qty, price: parseInt(input.dataset.price, 10) || 0 });
    });
    return items;
  }

  function updateTotal() {
    var total = collectItems().reduce(function (s, it) { return s + it.qty * it.price; }, 0);
    document.getElementById("totalAmount").textContent = won(total);
  }

  function buildFallbackText(payload) {
    var lines = ["[이감 모의고사 주문]", "지점: " + payload.branch, "담당자: " + payload.manager + " / " + payload.phone];
    payload.items.forEach(function (it) { lines.push("- " + it.product + " x " + it.qty); });
    if (payload.memo) lines.push("메모: " + payload.memo);
    lines.push("제출시각: " + new Date().toLocaleString("ko-KR"));
    return lines.join("\n");
  }

  function validate() {
    var branch = document.getElementById("branch").value;
    var manager = document.getElementById("manager").value.trim();
    var phone = document.getElementById("phone").value.trim();
    var items = collectItems();
    if (!branch) return { err: "지점을 선택해 주세요." };
    if (!manager) return { err: "담당자 이름을 입력해 주세요." };
    if (!phone) return { err: "담당자 연락처를 입력해 주세요." };
    if (!items.length) return { err: "주문 수량을 1개 이상 입력해 주세요." };
    return { branch: branch, manager: manager, phone: phone, items: items, memo: document.getElementById("memo").value.trim() };
  }

  document.getElementById("submitBtn").addEventListener("click", function () {
    var payload = validate();
    if (payload.err) { showMsg("err", payload.err); return; }
    var btn = this;
    if (!API) { showFallback(payload); return; }
    btn.disabled = true; btn.textContent = "제출 중...";
    fetch(API, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "order", data: payload })
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res.ok) {
          showMsg("ok", "주문이 접수되었습니다. 주문번호 <span class='order-id'>" + res.orderId + "</span> 를 보관해 주세요.");
          document.querySelectorAll("#productList input[type=number]").forEach(function (i) { i.value = 0; });
          document.getElementById("memo").value = "";
          updateTotal();
        } else {
          throw new Error(res.error || "접수 실패");
        }
      })
      .catch(function () {
        showMsg("err", "자동 접수에 실패했습니다. 아래 주문 텍스트를 복사해 담당자에게 보내 주세요.");
        showFallback(payload);
      })
      .finally(function () { btn.disabled = false; btn.textContent = "주문 제출"; });
  });

  function showFallback(payload) {
    var card = document.getElementById("fallbackCard");
    card.style.display = "block";
    document.getElementById("fallbackText").value = buildFallbackText(payload);
    if (!API) showMsg("err", "시스템 연결 전입니다. 아래 주문 텍스트를 복사해 본사 담당자에게 보내 주세요.");
    card.scrollIntoView({ behavior: "smooth" });
  }

  document.getElementById("copyBtn").addEventListener("click", function () {
    var textArea = document.getElementById("fallbackText");
    textArea.select();
    navigator.clipboard.writeText(textArea.value).then(function () {
      document.getElementById("copyBtn").textContent = "복사 완료";
    });
  });

  // 초기 데이터 로드
  if (API) {
    fetch(API + "?action=public")
      .then(function (r) { return r.json(); })
      .then(function (res) {
        branches = res.branches || [];
        products = res.products || [];
        renderBranches(); renderProducts();
      })
      .catch(function () {
        document.getElementById("productList").textContent = "데이터를 불러오지 못했습니다. 새로고침 후에도 같으면 본사에 문의해 주세요.";
      });
  } else {
    document.getElementById("productList").textContent = "시스템 연결 전입니다. 관리자가 설치가이드에 따라 API를 연결하면 상품 목록이 표시됩니다.";
  }
})();
</script>
</body>
</html>
